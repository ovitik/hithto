model:
  model_name: google/gemma-4-E2B
  instruction_model_name: google/gemma-4-E2B-it
  dtype: bf16
  qlora_4bit: false
  trust_remote_code: true
  freeze_backbone: true
  unfreeze_top_layers: 0

thought_builder:
  enabled: false
  hidden_size: 1536
  mode: replacement
  grouping: fixed
  fixed_window: 4
  max_levels: 0
  min_group_size: 2
  max_group_size: 8
  hard: false

loss:
  alpha_distillation: 0.0
  beta_reconstruction: 0.0
  gamma_paraphrase: 0.0
  delta_compression: 0.0
  epsilon_stability: 0.0

train:
  seed: 1
  batch_size: 1
  lr: 0.0002
  steps: 100
  max_length: 512
  log_jsonl: runs/baseline/log.jsonl
